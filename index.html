<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="米奇數學">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3069/3069172.png"> 
    
    <title>胤彥的魔法數學屋</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Varela+Round&display=swap');

        :root {
            --mickey-red: #E3001B;
            --mickey-black: #111111;
            --mickey-yellow: #FFD700;
            --mickey-white: #FFFFFF;
            --ear-color: #111111; /* 動態耳朵顏色 */
            --bg-gradient: radial-gradient(circle at center, #8a0000 0%, #2b0000 100%);
        }

        body {
            margin: 0; padding: 0; font-family: 'Fredoka One', sans-serif;
            background: var(--bg-gradient); height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            color: var(--mickey-white); user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #magic-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        #game-container {
            position: relative; z-index: 10; width: 90%; max-width: 500px; height: 85vh;
            background: rgba(255, 255, 255, 0.95); border-radius: 40px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5), 0 20px 50px rgba(0,0,0,0.5);
            border: 8px solid var(--mickey-black); display: flex;
            flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
        }

        .mickey-ears {
            position: absolute; top: -50px; width: 100%; height: 60px;
            display: flex; justify-content: center; gap: 180px; z-index: -1;
        }
        .ear {
            width: 120px; height: 120px; background: var(--ear-color);
            border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: background 0.5s ease;
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; box-sizing: border-box; color: var(--mickey-black); }
        .screen.active { display: flex; }

        h1 { font-size: 2.8rem; color: var(--mickey-red); text-shadow: 2px 2px 0px var(--mickey-black); margin-bottom: 5px; }
        .total-stars-display { font-size: 1.2rem; color: #d4a017; margin-bottom: 15px; }

        .jelly-btn {
            background: var(--mickey-yellow); color: var(--mickey-black); border: 4px solid var(--mickey-black);
            padding: 12px 30px; font-size: 1.5rem; border-radius: 50px; cursor: pointer;
            margin: 8px; transition: all 0.1s; box-shadow: 0 6px 0 #c49a00;
        }
        .jelly-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #c49a00; }
        .btn-small { padding: 8px 20px; font-size: 1rem; background: #eee; }

        /* --- 商店 UI --- */
        .shop-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; padding: 10px; }
        .shop-item {
            background: white; border: 3px solid #ddd; border-radius: 20px; padding: 15px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .item-preview { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #000; }
        .price-tag { font-size: 0.9rem; color: #666; }
        .owned { border-color: var(--mickey-red); background: #fff5f5; }

        /* --- 原有遊戲 UI --- */
        .hud { position: absolute; top: 0; width: 100%; background: var(--mickey-red); color: white; padding: 15px 20px; display: flex; justify-content: space-between; border-bottom: 5px solid var(--mickey-black); z-index: 15; }
        .question-box { font-size: 4rem; margin: 20px 0; }
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; }
        .option-card { background: white; border: 4px solid var(--mickey-black); border-radius: 20px; padding: 15px; font-size: 2rem; cursor: pointer; box-shadow: 0 6px 0 #ddd; touch-action: manipulation; }
        .correct { background: #4CD964 !important; color: white; }
        .wrong { background: var(--mickey-red) !important; color: white; }
        #combo-text { position: absolute; top: 100px; right: 20px; color: var(--mickey-red); font-size: 1.8rem; transform: rotate(15deg) scale(0); transition: 0.2s; font-weight: bold; }
        #combo-text.show { transform: rotate(15deg) scale(1.2); }

        .audio-control { position: absolute; bottom: 20px; right: 20px; background: white; width: 40px; height: 40px; border-radius: 50%; border: 2px solid #000; display: flex; align-items: center; justify-content: center; z-index: 20; }
    </style>
</head>
<body>

    <audio id="bgm" loop><source src="happy-kids-333364.mp3" type="audio/mpeg"></audio>
    <canvas id="magic-canvas"></canvas>

    <div class="mickey-ears">
        <div class="ear"></div>
        <div class="ear"></div>
    </div>

    <div id="game-container">
        <div id="start-screen" class="screen active">
            <h1>魔法算術</h1>
            <div class="total-stars-display">💰 我的星星存摺: <span class="total-stars-val">0</span> ★</div>
            <button class="jelly-btn" onclick="game.start()">開始冒險</button>
            <button class="jelly-btn btn-small" onclick="game.showShop()">魔法商店 🛒</button>
        </div>

        <div id="game-screen" class="screen">
            <div id="combo-text">COMBO x0</div>
            <div class="hud">
                <span>LV <span id="level-num">1</span></span>
                <div style="background:rgba(0,0,0,0.2); padding:2px 10px; border-radius:15px;">★ <span id="score">0</span></div>
            </div>
            <div id="question-text" class="question-box"></div>
            <div class="options-grid" id="options-container"></div>
        </div>

        <div id="shop-screen" class="screen">
            <h1>魔法商店</h1>
            <div class="total-stars-display">餘額: <span class="total-stars-val">0</span> ★</div>
            <div class="shop-grid" id="shop-items-container"></div>
            <button class="jelly-btn btn-small" onclick="game.showStart()">回主選單</button>
        </div>

        <div id="result-screen" class="screen">
            <h1 id="result-rank">冒險完成！</h1>
            <div style="font-size: 4rem; color: gold;">★ <span id="final-score">0</span></div>
            <p id="result-msg"></p>
            <button class="jelly-btn" onclick="location.reload()">再玩一次</button>
        </div>

        <div class="audio-control" id="mute-btn">🎵</div>
    </div>

<script>
// --- 粒子效果 (省略重複部分，保持原本邏輯) ---
const canvas = document.getElementById('magic-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();
class P { constructor() { this.reset(); } reset() { this.x = Math.random()*canvas.width; this.y = canvas.height+10; this.s = Math.random()*3+1; this.v = Math.random()*1+0.5; } update() { this.y -= this.v; if(this.y<-10)this.reset(); } draw() { ctx.fillStyle="white"; ctx.globalAlpha=0.3; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fill(); } }
for(let i=0;i<40;i++)particles.push(new P());
function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(anim); } anim();

// --- 商店設定 ---
const SHOP_ITEMS = [
    { id: 'default', name: '經典黑', color: '#111111', price: 0 },
    { id: 'gold', name: '勇者金', color: '#FFD700', price: 50 },
    { id: 'pink', name: '夢幻粉', color: '#FF69B4', price: 150 },
    { id: 'blue', name: '閃耀藍', color: '#00BFFF', price: 300 }
];

class MathGame {
    constructor() {
        this.score = 0; this.combo = 0; this.currentLevel = 1; this.currentQ = 1;
        this.totalStars = parseInt(localStorage.getItem('math_total_stars')) || 0;
        this.unlockedItems = JSON.parse(localStorage.getItem('math_unlocked')) || ['default'];
        this.equipped = localStorage.getItem('math_equipped') || 'default';
        
        this.init();
    }

    init() {
        this.updateStarUI();
        this.applyEquippedColor();
        document.getElementById('mute-btn').onclick = () => this.toggleAudio();
        this.bgm = document.getElementById('bgm');
    }

    updateStarUI() {
        document.querySelectorAll('.total-stars-val').forEach(el => el.textContent = this.totalStars);
    }

    applyEquippedColor() {
        const item = SHOP_ITEMS.find(i => i.id === this.equipped);
        document.documentElement.style.setProperty('--ear-color', item ? item.color : '#111111');
    }

    showStart() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('start-screen').classList.add('active');
    }

    showShop() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('shop-screen').classList.add('active');
        this.renderShop();
    }

    renderShop() {
        const container = document.getElementById('shop-items-container');
        container.innerHTML = '';
        SHOP_ITEMS.forEach(item => {
            const isUnlocked = this.unlockedItems.includes(item.id);
            const isEquipped = this.equipped === item.id;
            const div = document.createElement('div');
            div.className = `shop-item ${isUnlocked ? 'owned' : ''}`;
            div.innerHTML = `
                <div class="item-preview" style="background:${item.color}"></div>
                <div style="font-weight:bold">${item.name}</div>
                <div class="price-tag">${isUnlocked ? '已擁有' : '💰 ' + item.price}</div>
                <button class="btn-small" onclick="game.handleShop('${item.id}')">
                    ${isEquipped ? '裝備中' : (isUnlocked ? '裝備' : '購買')}
                </button>
            `;
            container.appendChild(div);
        });
    }

    handleShop(id) {
        const item = SHOP_ITEMS.find(i => i.id === id);
        if (this.unlockedItems.includes(id)) {
            this.equipped = id;
            localStorage.setItem('math_equipped', id);
        } else {
            if (this.totalStars >= item.price) {
                this.totalStars -= item.price;
                this.unlockedItems.push(id);
                this.equipped = id;
                localStorage.setItem('math_total_stars', this.totalStars);
                localStorage.setItem('math_unlocked', JSON.stringify(this.unlockedItems));
                localStorage.setItem('math_equipped', id);
                alert(`成功購買 ${item.name}！`);
            } else {
                alert('星星不夠喔！快去冒險賺星星吧！');
            }
        }
        this.updateStarUI();
        this.applyEquippedColor();
        this.renderShop();
    }

    start() {
        this.bgm.play().catch(()=>{});
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        this.score = 0; this.combo = 0; this.currentLevel = 1; this.currentQ = 1;
        this.nextQuestion();
    }

    // --- 遊戲核心邏輯 (延續之前版本) ---
    nextQuestion() {
        if(this.currentQ > 10) { this.endGame(); return; }
        this.isProcessing = false;
        document.getElementById('level-num').textContent = this.currentLevel;
        document.getElementById('score').textContent = this.score;
        
        const max = this.currentLevel * 10;
        const n1 = Math.floor(Math.random()*max)+1;
        const n2 = Math.floor(Math.random()*n1);
        const isAdd = Math.random() > 0.5;
        this.ans = isAdd ? n1 + n2 : n1 - n2;
        document.getElementById('question-text').textContent = `${n1} ${isAdd?'+':'-'} ${n2} = ?`;
        
        const opts = new Set([this.ans]);
        while(opts.size < 4) opts.add(this.ans + Math.floor(Math.random()*10)-5);
        const arr = Array.from(opts).sort(()=>Math.random()-0.5);
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        arr.forEach(n => {
            const b = document.createElement('div'); b.className='option-card'; b.textContent=n;
            b.onclick=(e)=>this.check(n, e.target); container.appendChild(b);
        });
    }

    check(val, el) {
        if(this.isProcessing) return; this.isProcessing = true;
        const comboEl = document.getElementById('combo-text');

        if(val === this.ans) {
            el.classList.add('correct'); this.score++; this.combo++;
            if(this.combo > 1) { comboEl.textContent = `COMBO x${this.combo}`; comboEl.classList.add('show'); }
        } else {
            el.classList.add('wrong'); this.combo = 0; comboEl.classList.remove('show');
        }
        setTimeout(() => { this.currentQ++; this.nextQuestion(); }, 1000);
    }

    endGame() {
        // 增加星星存摺
        this.totalStars += this.score;
        localStorage.setItem('math_total_stars', this.totalStars);

        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        document.getElementById('final-score').textContent = this.score;
        
        const rankEl = document.getElementById('result-rank');
        if(this.score >= 9) rankEl.textContent="🏆 傳說級魔法師";
        else if(this.score >= 7) rankEl.textContent="✨ 領袖級魔法師";
        else rankEl.textContent="🌱 數學小學徒";
        document.getElementById('result-msg').textContent = `獲得 ${this.score} 顆星星，已存入存摺！`;
        this.updateStarUI();
    }

    toggleAudio() {
        if(this.bgm.paused) { this.bgm.play(); document.getElementById('mute-btn').textContent="🎵"; }
        else { this.bgm.pause(); document.getElementById('mute-btn').textContent="🔇"; }
    }
}
const game = new MathGame();
</script>
</body>
</html>
