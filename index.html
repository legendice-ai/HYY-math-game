<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="米奇數學">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3069/3069172.png"> 
    
    <title>胤彥的魔法數學屋</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Varela+Round&display=swap');

        :root {
            --mickey-red: #E3001B;
            --mickey-black: #111111;
            --mickey-yellow: #FFD700;
            --mickey-white: #FFFFFF;
            --bg-gradient: radial-gradient(circle at center, #8a0000 0%, #2b0000 100%);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Fredoka One', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--mickey-white);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #magic-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        #game-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5), 0 20px 50px rgba(0,0,0,0.5);
            border: 8px solid var(--mickey-black);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .mickey-ears {
            position: absolute;
            top: -50px;
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: center;
            gap: 180px;
            z-index: -1;
        }
        .ear {
            width: 120px;
            height: 120px;
            background: var(--mickey-black);
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            color: var(--mickey-black);
        }
        .screen.active { display: flex; }

        h1 {
            font-size: 3rem;
            color: var(--mickey-red);
            text-shadow: 2px 2px 0px var(--mickey-black);
            margin-bottom: 10px;
        }

        p { font-family: 'Varela Round', sans-serif; font-weight: bold; }

        .jelly-btn {
            background: var(--mickey-yellow);
            color: var(--mickey-black);
            border: 4px solid var(--mickey-black);
            padding: 15px 40px;
            font-size: 1.8rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Fredoka One', sans-serif;
            margin: 15px;
            position: relative;
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 0 #c49a00, 0 15px 20px rgba(0,0,0,0.2);
            text-transform: uppercase;
        }

        .jelly-btn:active {
            transform: translateY(8px) scale(0.95);
            box-shadow: 0 0 0 #c49a00, inset 0 5px 10px rgba(0,0,0,0.2);
        }

        .hud {
            position: absolute;
            top: 0;
            width: 100%;
            background: var(--mickey-red);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            font-size: 1.2rem;
            border-bottom: 5px solid var(--mickey-black);
            z-index: 15;
        }

        .star-badge {
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .progress-container {
            width: 100%;
            padding: 0 30px;
            margin-top: 80px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 15px;
            background: #eee;
            border-radius: 10px;
            border: 2px solid var(--mickey-black);
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--mickey-yellow);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* --- 連擊 Combo 顯示 --- */
        #combo-text {
            position: absolute;
            top: 110px;
            right: 30px;
            font-size: 2rem;
            color: var(--mickey-red);
            font-weight: bold;
            transform: rotate(15deg) scale(0);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            text-shadow: 2px 2px 0 #fff;
        }
        #combo-text.show { transform: rotate(15deg) scale(1.2); }

        .question-box {
            font-size: 4.5rem;
            color: var(--mickey-black);
            margin: 20px 0;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.1);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            padding: 10px;
        }

        .option-card {
            background: white;
            border: 4px solid var(--mickey-black);
            border-radius: 25px;
            padding: 20px;
            font-size: 2.5rem;
            color: var(--mickey-black);
            cursor: pointer;
            box-shadow: 0 8px 0 #ddd;
            transition: transform 0.1s;
            touch-action: manipulation;
        }

        .option-card:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #ddd;
        }

        .correct { background-color: #4CD964 !important; border-color: #2E7D32 !important; color: white !important; animation: pop 0.3s; }
        .wrong { background-color: var(--mickey-red) !important; border-color: #8B0000 !important; color: white !important; animation: shake 0.4s; }

        .audio-control {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--mickey-white);
            color: var(--mickey-black);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--mickey-black);
            cursor: pointer;
            z-index: 20;
        }

        @keyframes pop { 50% { transform: scale(1.1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        @keyframes starSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .star-anim { animation: starSpin 0.5s ease-out; }

    </style>
</head>
<body>

    <audio id="bgm" loop preload="auto">
        <source src="happy-kids-333364.mp3" type="audio/mpeg">
    </audio>

    <canvas id="magic-canvas"></canvas>

    <div class="mickey-ears">
        <div class="ear"></div>
        <div class="ear"></div>
    </div>

    <div id="game-container">
        <div id="combo-text">COMBO x0</div>

        <div id="start-screen" class="screen active">
            <div style="font-size: 5rem; margin-bottom:-20px;">✨</div>
            <h1>胤彥的<br>魔法算術</h1>
            <p style="font-size: 1.2rem; color: #555;">挑戰最高等級頭銜！</p>
            <button class="jelly-btn" onclick="game.start()">開始冒險</button>
        </div>

        <div id="game-screen" class="screen">
            <div class="hud">
                <span>LEVEL <span id="level-num">1</span></span>
                <div class="star-badge">
                    <span style="color: gold; font-size: 1.5rem;" id="star-icon">★</span> 
                    <span id="score">0</span>
                </div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>
                <p style="font-size: 0.9rem; color: #999; margin-top: 5px;">Question <span id="q-num">1</span>/10</p>
            </div>

            <div id="question-text" class="question-box"></div>
            <div class="options-grid" id="options-container"></div>
        </div>

        <div id="result-screen" class="screen">
            <h1 id="result-title">冒險完成！</h1>
            <div style="font-size: 6rem; color: gold; text-shadow: 2px 2px 5px rgba(0,0,0,0.3);">★ <span id="final-score">0</span></div>
            <p id="result-rank" style="font-size: 1.8rem; color: var(--mickey-red); margin: 10px 0;"></p>
            <p id="result-msg">你是最棒的數學魔法師！</p>
            <button class="jelly-btn" onclick="location.reload()">再玩一次</button>
        </div>

        <div class="audio-control" id="mute-btn">🎵</div>
    </div>

<script>
/** 粒子背景 (維持原樣) **/
const canvas = document.getElementById('magic-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
class Particle {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random() * 100;
        this.size = Math.random() * 4 + 1;
        this.speed = Math.random() * 1 + 0.5;
        this.opacity = Math.random() * 0.5 + 0.2;
        this.color = Math.random() > 0.8 ? '#FFD700' : '#FFFFFF';
    }
    update() { this.y -= this.speed; if (this.y < -10) this.reset(); }
    draw() {
        ctx.fillStyle = this.color; ctx.globalAlpha = this.opacity;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
    }
}
for (let i = 0; i < 50; i++) particles.push(new Particle());
function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animateParticles);
}
animateParticles();

/** 遊戲主邏輯 **/
class MathGame {
    constructor() {
        this.levels = 10;
        this.questionsPerLevel = 10;
        this.currentLevel = 1;
        this.currentQ = 1;
        this.score = 0;
        this.combo = 0; // 新增：連擊計數
        this.isProcessing = false;
        this.bgm = document.getElementById('bgm');
        this.isMuted = false;
        this.bgm.volume = 0.4;
        document.getElementById('mute-btn').addEventListener('click', () => this.toggleAudio());
    }

    toggleAudio() {
        if (this.isMuted) {
            this.bgm.play().catch(()=>{});
            document.getElementById('mute-btn').textContent = "🎵";
            this.isMuted = false;
        } else {
            this.bgm.pause();
            document.getElementById('mute-btn').textContent = "🔇";
            this.isMuted = true;
        }
    }

    start() {
        if(!this.isMuted) this.bgm.play().catch(e => console.log("Audio block"));
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        this.startLevel(1);
    }

    startLevel(lvl) {
        this.currentLevel = lvl;
        this.currentQ = 1;
        document.getElementById('level-num').textContent = lvl;
        this.nextQuestion();
    }

    nextQuestion() {
        if (this.currentQ > this.questionsPerLevel) {
            if (this.currentLevel < this.levels) {
                this.currentLevel++;
                setTimeout(() => {
                    alert(`太強了！進入第 ${this.currentLevel} 關！`);
                    this.startLevel(this.currentLevel);
                }, 500);
            } else {
                this.endGame();
            }
            return;
        }
        this.isProcessing = false;
        this.updateHUD();
        const qData = this.generateMath(this.currentLevel);
        this.correctAnswer = qData.answer;
        document.getElementById('question-text').textContent = qData.text;
        this.renderOptions(qData.answer, qData.maxRange);
    }

    updateHUD() {
        document.getElementById('q-num').textContent = this.currentQ;
        document.getElementById('score').textContent = this.score;
        const pct = ((this.currentQ - 1) / this.questionsPerLevel) * 100;
        document.getElementById('progress-bar').style.width = `${pct}%`;
        
        // 更新連擊 UI
        const comboEl = document.getElementById('combo-text');
        if (this.combo > 1) {
            comboEl.textContent = `COMBO x${this.combo}`;
            comboEl.classList.add('show');
        } else {
            comboEl.classList.remove('show');
        }
    }

    generateMath(level) {
        let n1, n2, ans, max = 10;
        if (level <= 2) max = 10;
        else if (level <= 4) max = 20;
        else if (level <= 6) max = 50;
        else if (level <= 8) max = 80;
        else max = 100;

        const isAdd = Math.random() > (level > 3 ? 0.5 : 0.2);
        if (isAdd) {
            n1 = Math.floor(Math.random() * (max - 1)) + 1;
            n2 = Math.floor(Math.random() * (max - n1)) + 1;
            ans = n1 + n2;
        } else {
            n1 = Math.floor(Math.random() * (max - 1)) + 2;
            n2 = Math.floor(Math.random() * n1);
            ans = n1 - n2;
        }
        return { text: `${n1} ${isAdd ? '+' : '-'} ${n2} = ?`, answer: ans, maxRange: max };
    }

    renderOptions(correct, range) {
        let opts = new Set([correct]);
        while(opts.size < 4) {
            let fake, r = Math.random();
            if (r < 0.3) fake = correct + 1;
            else if (r < 0.6) fake = correct - 1;
            else if (r < 0.8) fake = correct + 10;
            else fake = Math.floor(Math.random() * (range + 1));
            if (fake >= 0 && fake <= 100 && fake !== correct) opts.add(fake);
        }
        const arr = Array.from(opts).sort(() => Math.random() - 0.5);
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        arr.forEach(num => {
            const btn = document.createElement('div');
            btn.className = 'option-card';
            btn.textContent = num;
            btn.onclick = (e) => this.check(num, e.target);
            container.appendChild(btn);
        });
    }

    check(val, el) {
        if (this.isProcessing) return;
        this.isProcessing = true;

        if (val === this.correctAnswer) {
            el.classList.add('correct');
            this.score++;
            this.combo++; // 連擊增加
            const star = document.getElementById('star-icon');
            star.classList.remove('star-anim');
            void star.offsetWidth;
            star.classList.add('star-anim');
        } else {
            el.classList.add('wrong');
            this.combo = 0; // 連擊中斷
            document.querySelectorAll('.option-card').forEach(c => {
                if(parseInt(c.textContent) === this.correctAnswer) {
                    setTimeout(() => c.classList.add('correct'), 200);
                }
            });
        }
        this.updateHUD();
        setTimeout(() => { this.currentQ++; this.nextQuestion(); }, 1200);
    }

    endGame() {
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        document.getElementById('final-score').textContent = this.score;
        
        // 評語系統
        const rankEl = document.getElementById('result-rank');
        const msgEl = document.getElementById('result-msg');
        const total = this.levels * this.questionsPerLevel; // 總分 100
        
        if (this.score >= 95) {
            rankEl.textContent = "🏆 傳說級數學大師";
            msgEl.textContent = "簡直太不可思議了！你是數字的主人！";
        } else if (this.score >= 80) {
            rankEl.textContent = "✨ 領袖級魔法師";
            msgEl.textContent = "表現非常出色！胤彥為你感到驕傲！";
        } else if (this.score >= 60) {
            rankEl.textContent = "🧙‍♂️ 見習魔法師";
            msgEl.textContent = "不錯喔！再加把勁就能掌握高級魔法了。";
        } else {
            rankEl.textContent = "🌱 數學小學徒";
            msgEl.textContent = "冒險才剛開始，繼續努力練習吧！";
        }
    }
}
const game = new MathGame();
</script>
</body>
</html>
